<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Invoker Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Invoker Trainer</h1>
</header>

<div class="game-area">
    <img id="invoker" src="images/invoker.png" alt="Invoker">
    <img id="enemy" src="images/creep.png" alt="Creep">
    <div id="spell-display">Заклинание: <span id="current-spell"></span></div>
    <div id="orbs">Орбы: <span id="orb-sequence"></span></div>
    <div id="message"></div>
</div>

<footer>
    <p>Клавиши: Q=Wex, W=Quas, E=Exort, R=Invoke, D/F=каст</p>
</footer>

<script src="script.js"></script>
</body>
</html>
