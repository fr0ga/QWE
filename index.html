<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Invoker Trainer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' viewBox='0 0 64 64'>
  <circle cx='16' cy='32' r='10' fill='blue'/>
  <circle cx='32' cy='32' r='10' fill='magenta'/>
  <circle cx='48' cy='32' r='10' fill='orange'/>
</svg>">

</head>
<body>
<header>
    <h1>Invoker Trainer</h1>

</header>

<div class="layout">
    <!-- Панель статистики -->
    <div id="stats-panel"></div>

    <!-- Игровая область -->
    <div class="game-area">
        <img id="invoker" src="images/invoker.png" alt="Invoker">
        <img id="enemy" src="images/creep.png" alt="Creep">
        <div id="spell-display">Заклинание: <span id="current-spell"></span></div>
        <div id="orbs">Орбы: <span id="orb-sequence"></span></div>
        <div id="message"></div>
    </div>
</div>


<footer>
    <p>Клавиши: Q=Wex, W=Quas, E=Exort, R=Invoke, D=каст</p>
</footer>

<script src="script.js"></script>
</body>
</html>
